[program:valkey]
command=valkey-server --bind 127.0.0.1 --port 6379 --dir /workspaces/kriti/database
autostart=true
autorestart=true
user=ubuntu
stdout_logfile=/workspaces/kriti/storage/logs/valkey.log
stderr_logfile=/workspaces/kriti/storage/logs/valkey.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=0

[program:postgresql]
command=/usr/lib/postgresql/17/bin/postgres -D /home/ubuntu/pgdata -p 5432 -c listen_addresses=127.0.0.1 -c unix_socket_directories=/tmp
autostart=true
autorestart=true
user=ubuntu
stdout_logfile=/workspaces/kriti/storage/logs/postgresql.log
stderr_logfile=/workspaces/kriti/storage/logs/postgresql.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=0
